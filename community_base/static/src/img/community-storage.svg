<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="56" rx="20" ry="3.5" fill="#C1DBF6"/>
  <!-- Locker frame -->
  <rect x="12" y="10" width="40" height="44" rx="2" fill="white" stroke="#374874" stroke-width="1.5"/>
  <!-- Top compartment -->
  <rect x="14" y="12" width="36" height="13" rx="1" fill="#C1DBF6" stroke="#374874" stroke-width="1"/>
  <!-- Middle compartment -->
  <rect x="14" y="27" width="36" height="13" rx="1" fill="#FBDBD0" stroke="#374874" stroke-width="1"/>
  <!-- Bottom compartment -->
  <rect x="14" y="42" width="36" height="10" rx="1" fill="#C1DBF6" stroke="#374874" stroke-width="1"/>
  <!-- Handles -->
  <rect x="29" y="16.5" width="6" height="2" rx="1" fill="#374874"/>
  <rect x="29" y="31.5" width="6" height="2" rx="1" fill="#374874"/>
  <rect x="29" y="45.5" width="6" height="2" rx="1" fill="#374874"/>
  <!-- Lock on middle compartment -->
  <circle cx="40" cy="33.5" r="2" fill="white" stroke="#374874" stroke-width="1"/>
  <rect x="39.2" y="33.5" width="1.6" height="3" fill="#374874" rx="0.3"/>
  <!-- Item peeking from top compartment -->
  <rect x="18" y="14" width="8" height="9" rx="1" fill="#FBDBD0" stroke="#374874" stroke-width="0.8"/>
</svg>
